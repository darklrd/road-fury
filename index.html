<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Fury</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 30px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #speed-value {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,100,0,0.8), 0 2px 4px rgba(0,0,0,0.8);
      line-height: 1;
    }
    #speed-unit {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    #speed-bar-container {
      width: 300px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    #speed-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.1s ease-out;
      background: linear-gradient(90deg, #00ff88, #ffaa00, #ff3300);
    }
    #gear {
      font-size: 24px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #start-screen h1 {
      font-size: 80px;
      font-weight: 900;
      color: #ff4400;
      text-shadow: 0 0 40px rgba(255,68,0,0.6);
      letter-spacing: 8px;
    }
    #start-screen p {
      font-size: 20px;
      color: rgba(255,255,255,0.6);
      margin-top: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="speed-value">0</div>
    <div id="speed-unit">km/h</div>
    <div id="speed-bar-container"><div id="speed-bar"></div></div>
    <div id="gear">N</div>
  </div>
  <div id="start-screen">
    <h1>ROAD FURY</h1>
    <p>Press any key to start</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
